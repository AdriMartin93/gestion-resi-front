<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestorResi - Inicio de Sesión</title>
    <!-- Tailwind CSS por CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hoja de estilos global profesional -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center font-sans p-4">

    <div class="bg-white border border-slate-200 shadow-xl rounded-2xl max-w-md w-full p-8 space-y-6 card-premium">
        <div class="text-center space-y-2">
            <span class="text-2xl font-bold text-sky-600 font-mono tracking-wider block">🏢 GESTOR RESI</span>
            <h1 class="text-xl font-semibold text-slate-700">Acceso al Sistema</h1>
            <p class="text-xs text-slate-400">Introduce tus credenciales de empleado para continuar</p>
        </div>

        <div id="error-alert"
            class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 alert-premium text-xs font-medium"></div>

        <form class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Nombre de Usuario</label>
                <input type="text" id="username" required autocomplete="username"
                    class="w-full input-premium focus:outline-none focus:border-sky-500 transition-colors">
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Contraseña</label>
                <input type="password" id="password" required autocomplete="current-password"
                    class="w-full input-premium focus:outline-none focus:border-sky-500 transition-colors">
            </div>
            <button type="submit"
                class="w-full btn-primary text-white font-bold text-sm py-3 mt-2">
                Iniciar Sesión
            </button>
        </form>
    </div>

    <!-- Scripts del Sistema -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestorResi - Gestión de Usuarios</title>
    <!-- Tailwind CSS por CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hoja de estilos global profesional -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- Barra de Navegación Superior -->
    <nav
        class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="menu.html"
                class="text-xl font-bold text-sky-600 font-mono tracking-wider hover:opacity-80 transition-opacity">🏢
                GESTOR RESI</a>
            <span
                class="bg-slate-100 text-slate-700 text-xs px-2.5 py-0.5 rounded-full font-medium border border-slate-200">
                ⚙️ Gestión de Usuarios
            </span>
        </div>
        <div class="flex items-center gap-4">
            <a href="administracion.html"
                class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-4 py-2 rounded-lg border border-slate-300 transition-colors">
                &larr; Volver a Administración
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="max-w-4xl mx-auto p-6 w-full flex-grow flex flex-col justify-start">
        <div
            class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-200 pb-5">
            <div>
                <h1 class="text-2xl font-bold text-slate-700 tracking-normal">Plantilla de Empleados</h1>
                <p class="text-xs text-slate-400 mt-1">Alta, baja, modificaciones y visualización de perfiles del
                    personal de la empresa.</p>
            </div>
            <button onclick="abrirModalCrear()"
                class="btn-primary text-white font-bold text-xs px-5 py-2.5 flex items-center gap-2 shadow-md">
                <span>➕</span> Nuevo Empleado
            </button>
        </div>

        <div id="lista-empleados" class="space-y-3">
            <div class="text-center py-8 text-slate-400 text-sm">Cargando empleados...</div>
        </div>
    </main>

    <!-- VISTA MODAL: FORMULARIO ALTA / EDICIÓN -->
    <div id="modal-empleado"
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div
            class="bg-white rounded-2xl border border-slate-200 shadow-xl max-w-lg w-full overflow-hidden scale-95 transition-all card-premium">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                <h3 id="modal-titulo" class="text-lg font-bold text-slate-700">Registrar Empleado</h3>
                <button onclick="cerrarModal()"
                    class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
            </div>

            <form id="form-empleado" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
                <input type="hidden" id="empleado-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Nombre</label>
                        <input type="text" id="modal-emp-nombre" required class="w-full input-premium">
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Apellidos</label>
                        <input type="text" id="modal-emp-apellidos" required class="w-full input-premium">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Usuario</label>
                        <input type="text" id="modal-emp-username" required minlength="4" maxlength="20"
                            class="w-full input-premium">
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">DNI</label>
                        <input type="text" id="modal-emp-dni" required pattern="^[0-9]{8}[TRWAGMYFPDXBNJZSQVHLCKE]$"
                            placeholder="12345678A" class="w-full input-premium">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Contraseña</label>
                        <input type="password" id="modal-emp-password" minlength="6" class="w-full input-premium">
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Teléfono</label>
                        <input type="text" id="modal-emp-telefono" pattern="^[0-9]{9}$" placeholder="600123456"
                            class="w-full input-premium">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-1">Correo
                        Electrónico</label>
                    <input type="email" id="modal-emp-email" required class="w-full input-premium">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider mb-2">Rol
                        Asignado</label>
                    <div class="flex flex-wrap gap-3 bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_DIRECTOR"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Director
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_DOCTOR"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Doctor
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_PSICOLOGO"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Psicólogo
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_ENFERMERO"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Enfermero
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_AUXILIAR"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Auxiliar
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_TRSOCIAL"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Trabajador Social
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_FISIO"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Fisioterapeuta
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_ANIMADOR"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Animador
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_COCINERO"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Cocinero
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_ENCARGADO"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Encargado
                        </label>

                        <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 cursor-pointer">
                            <input type="checkbox" name="emp-roles" value="ROLE_LIMPIEZA"
                                class="rounded text-sky-600 focus:ring-sky-500">
                            Limpieza
                        </label>
                    </div>
                </div>
                <div class="pt-4 flex justify-end gap-3 border-t border-slate-100">
                    <button type="button" onclick="cerrarModal()"
                        class="btn-secondary text-slate-700 bg-slate-100 hover:bg-slate-200 px-4 py-2.5 border border-slate-300">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary text-white px-5 py-2.5 shadow-md">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <template id="template-empleado">
        <div
            class="empleado-card bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mb-3 card-premium">

            <!-- Cabecera de la tarjeta clickable -->
            <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50/80 btn-detalles">
                <div class="flex items-center gap-3">
                    <div
                        class="avatar w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-sm font-bold border border-slate-200">
                        <!-- Aquí irá la inicial -->
                    </div>
                    <span
                        class="nombre-completo font-semibold text-sm text-slate-700"><!-- Aquí irá el nombre --></span>
                </div>
                <div class="flex items-center gap-2">
                    <button class="btn-editar text-slate-400 hover:text-sky-600 p-1 transition-colors">✏️</button>
                    <button class="btn-borrar text-slate-400 hover:text-red-600 p-1 transition-colors">🗑️</button>
                </div>
            </div>

            <!-- Cuerpo desplegable de detalles -->
            <div
                class="detalles-box hidden border-t border-slate-100 bg-slate-50/50 p-4 text-xs font-mono grid grid-cols-2 gap-3">
                <div><strong>Usuario:</strong> <span class="txt-username"></span></div>
                <div><strong>DNI:</strong> <span class="txt-dni"></span></div>
                <div><strong>Email:</strong> <span class="txt-email"></span></div>
                <div><strong>Teléfono:</strong> <span class="txt-telefono"></span></div>

                <!-- Sección de visualización de Roles asignados -->
                <div class="col-span-2 border-t border-slate-200/60 pt-2 mt-1">
                    <strong class="block mb-1 text-slate-500 font-sans uppercase tracking-wider text-[10px]">Roles del
                        Trabajador:</strong>
                    <div class="contenedor-badges-roles flex flex-wrap"><!-- Aquí irán los badges --></div>
                </div>
            </div>

        </div>
    </template>


    <!-- Scripts del Sistema -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-usuarios.js"></script>
</body>

</html>
